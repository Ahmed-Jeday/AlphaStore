<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouton Retour en Haut</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        

        /* --- STYLES DU BOUTON --- */
        .scrollTop {
            /* Positionnement */
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 99;

            /* Dimensions et Forme */
            width: 65px;
            height: 65px;
            border-radius: 50%;
            
            /* Couleurs */
            background-color: #fbfbfb;
            border: none;
            cursor: pointer;
            
            /* Alignement icône + texte en colonne */
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: center;

            /* Ombre et transitions */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            
            /* Visibilité (Activer via JS ou enlever pour tester) */
            opacity: 1; 
            visibility: visible;
        }

        /* Effet au survol */
        .scrollTop:hover {
            background-color: #e40d0d; /* Change en rouge au survol */
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        /* Couleur de l'icône */
        #icon {
            color: #e40d0d; 
            font-size: 20px;
            transition: color 0.3s ease;
        }

        /* Couleur du texte */
        .scrollTop p {
            color: #111;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: bold;
            margin: 0; /* Retire les marges par défaut */
            padding-top: 2px;
        }

        /* Changement de couleur au survol pour les éléments internes */
        .scrollTop:hover #icon, 
        .scrollTop:hover p {
            color: white;
        }

    </style>
</head>
<body>



    <button class="scrollTop" >
        <i class="fa-solid fa-jet-fighter-up" id="icon"></i>
        <p>TOP</p>
    </button>

</body>
</html>
