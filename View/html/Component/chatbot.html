<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha - Assistant Shopping Intelligent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* === Garde le même beau design que tu avais === */
        body { margin:0; font-family: 'Inter', sans-serif; background: linear-gradient(145deg, #e9f0f5 0%, #f1f5f9 100%); }
        .chatbot-widget {
            position: fixed; bottom: 50px; right: 24px; width: 550px; max-width: calc(100vw - 40px);
            z-index: 1050; opacity: 0; visibility: hidden; transform: scale(0.92) translateY(20px);
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .chatbot-widget.open { opacity: 1; visibility: visible; transform: scale(1) translateY(0); }
        .chat-window { background: white; border-radius: 32px; overflow: hidden; box-shadow: 0 8px 28px rgba(0,0,0,0.15); }
        .chat-header { background: #b8f2e6; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
        .chat-body { display: flex; min-height: 480px; }
        .chat-sidebar { width: 68px; background: #fefefe; border-right: 1px solid #edf2f7; padding-top: 24px; gap: 28px; display: flex; flex-direction: column; align-items: center; }
        .sidebar-icon { font-size: 1.5rem; color: #cbd5e1; cursor: pointer; }
        .sidebar-icon.active { color: #2f80ed; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; background: #ffffff; max-height: 480px; }
        .message-row { display: flex; gap: 10px; margin-bottom: 18px; animation: fadeIn 0.3s; }
        .message-row.ai { justify-content: flex-start; }
        .message-row.user { justify-content: flex-end; }
        .avatar-ai { background: #eef2ff; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #2f80ed; }
        .bubble { max-width: 80%; padding: 12px 18px; border-radius: 22px; font-size: 0.95rem; line-height: 1.5; }
        .ai .bubble { background: #f8fafc; border: 1px solid #eef2ff; border-top-left-radius: 6px; }
        .user .bubble { background: #2f80ed; color: white; border-top-right-radius: 6px; }
        .product-strip { display: flex; gap: 12px; overflow-x: auto; padding: 10px 0; }
        .mini-card { min-width: 160px; background: white; border-radius: 18px; border: 1px solid #eef3fc; padding: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .mini-card-img { height: 110px; background: #f9fbfe; border-radius: 14px; overflow: hidden; }
        .mini-card-img img { width: 100%; height: 100%; object-fit: cover; }
        .mini-card h5 { font-size: 0.85rem; margin: 8px 0 4px; }
        .price { color: #2f80ed; font-weight: 700; }
        .btn-view { background: #2f80ed; color: white; border: none; border-radius: 30px; padding: 6px; font-size: 0.8rem; margin-top: 8px; cursor: pointer; width: 100%; }
        .chat-input-area { padding: 14px 16px; background: white; border-top: 1px solid #edf2f7; display: flex; gap: 10px; }
        .input-field { flex: 1; background: #f1f5f9; border: none; border-radius: 40px; padding: 12px 18px; outline: none; font-size: 0.95rem; }
        .send-icon { background: #2f80ed; color: white; width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .chat-toggle-btn {
            position: fixed; bottom: 120px; right: 30px; width: 64px; height: 64px;
            background: #2f80ed; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 2rem; color: white; cursor: pointer; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.25);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="chat-toggle-btn" id="chatToggleBtn">
        <i class="fas fa-comment-dots"></i>
    </div>

    <div class="chatbot-widget" id="chatbotWidget">
        <div class="chat-window">
            <div class="chat-header">
                <div style="display:flex; align-items:center; gap:12px;">
                    <div style="background:white; width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.4rem;">🤖</div>
                    <div>
                        <h4 style="margin:0; color:#0f3b38;">Alpha</h4>
                        <span style="font-size:0.8rem; color:#2c6e64;">Assistant Shopping • 100 Produits</span>
                    </div>
                </div>
                <i class="fas fa-times" id="widgetCloseBtn" style="font-size:1.4rem; cursor:pointer; color:#2c6e64;"></i>
            </div>

            <div class="chat-body">
                <div class="chat-sidebar">
                    <i class="fas fa-comment-dots sidebar-icon active" data-view="chat"></i>
                    <i class="fas fa-user-circle sidebar-icon" data-view="profile"></i>
                    <i class="fas fa-shopping-bag sidebar-icon" data-view="bag"></i>
                    <i class="fas fa-cog sidebar-icon" data-view="settings"></i>
                </div>
                <div class="chat-messages" id="chatMessagesContainer"></div>
            </div>

            <div class="chat-input-area">
                <div class="input-field" id="messageInput" contenteditable="true" placeholder="Posez votre question..."></div>
                <div class="send-icon" id="sendButton"><i class="fas fa-paper-plane"></i></div>
            </div>
        </div>
    </div>


</body>
</html>
