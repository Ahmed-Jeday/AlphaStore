<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI Stylist | Aria Chat Widget</title>
    <!-- Google Fonts & Font Awesome 6 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
      

        
        .chatbot{
           
            background: linear-gradient(145deg, #e9f0f5 0%, #f1f5f9 100%);
            font-family: 'Inter', sans-serif;
            
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;

        }

        /* demo background content */
        .demo-content {
             font-family: 'Inter', sans-serif;
            text-align: center;
            max-width: 600px;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 3rem 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
        }
        .demo-content h1 {
            font-weight: 700;
            font-size: 2rem;
            color: #0f2b3d;
        }
        .demo-content p {
            margin-top: 1rem;
            color: #2c4c6e;
        }

        /* floating button */
        .chat-toggle-btn {
            position: fixed;
            
            bottom: 120px;
            right: 30px;
            width: 64px;
            height: 64px;
            background: #2f80ed;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
            transition: all 0.25s ease;
            z-index: 1000;
            border: none;
            color: white;
            font-size: 2rem;
        }
        .chat-toggle-btn:hover {
            transform: scale(1.05);
            background: #1c6ed4;
        }

        /* floating panel */
        .chatbot-widget {
            position: fixed;
            bottom: 50px;
            right: 24px;
            width: 550px;
            max-width: calc(100vw - 40px);
            z-index: 1050;
            opacity: 0;
            visibility: hidden;
            transform: scale(0.92) translateY(20px);
            transition: opacity 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1), visibility 0.25s, transform 0.25s ease;
            filter: drop-shadow(0 20px 35px -12px rgba(0, 0, 0, 0.25));
           
        }
        .chatbot-widget.open {
            opacity: 1;
            visibility: visible;
            transform: scale(1) translateY(0);
        }

        .chatbot-standalone {
            width: 100%;
            background: transparent;
        }

        .section-caption {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 0.75rem;
            padding-left: 6px;
        }
        .robot-icon-badge {
            background: #c0f0e8;
            width: 48px;
            height: 48px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.7rem;
            color: #0f766e;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .caption-text h3 {
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: #0f172a;
        }
        .caption-text p {
            font-size: 0.75rem;
            font-weight: 500;
            color: #334155;
            margin-top: 2px;
        }
        .chat-window {
            background: white;
            border-radius: 32px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 28px rgba(0,0,0,0.12);
        }
        .chat-header {
            background: #b8f2e6;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #d9f0ea;
        }
        .header-ai {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .robot-sm {
            background: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0f766e;
            font-size: 1.2rem;
        }
        .ai-title h4 {
            font-size: 1rem;
            font-weight: 700;
            color: #0f3b38;
        }
        .ai-title span {
            font-size: 0.65rem;
            font-weight: 500;
            color: #2c6e64;
        }
        .close-icon {
            color: #2c6e64;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .close-icon:hover {
            color: #0f3b38;
        }
        .chat-body {
            display: flex;
            min-height: 480px;
            background: white;
        }
        .chat-sidebar {
            width: 68px;
            background: #fefefe;
            border-right: 1px solid #edf2f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 24px;
            gap: 28px;
        }
        .sidebar-icon {
            font-size: 1.4rem;
            color: #cbd5e1;
            cursor: pointer;
            transition: 0.2s;
        }
        .sidebar-icon.active {
            color: #2f80ed;
        }
        .chat-messages {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 18px 14px;
            background: #ffffff;
            overflow-y: auto;
            gap: 18px;
            max-height: 480px;
            scroll-behavior: smooth;
        }
        /* message styles */
        .message-row {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            animation: fadeSlideUp 0.2s ease;
        }
        .message-row.ai {
            justify-content: flex-start;
        }
        .message-row.user {
            justify-content: flex-end;
        }
        .avatar-ai {
            background: #eef2ff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            color: #2f80ed;
            flex-shrink: 0;
        }
        .bubble {
            max-width: 80%;
            padding: 10px 16px;
            border-radius: 22px;
            font-size: 0.8rem;
            line-height: 1.4;
        }
        .ai .bubble {
            background: #f8fafc;
            border: 1px solid #eef2ff;
            color: #0f172a;
            border-top-left-radius: 5px;
        }
        .user .bubble {
            background: #2f80ed;
            color: white;
            border-top-right-radius: 5px;
        }
        .product-strip {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            overflow-x: auto;
            padding-bottom: 6px;
        }
        .mini-card {
            min-width: 150px;
            background: white;
            border-radius: 18px;
            border: 1px solid #eef3fc;
            padding: 8px 8px 10px;
        }
        .mini-card-img {
            background: #f9fbfe;
            border-radius: 14px;
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .mini-card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .mini-card h5 {
            font-size: 0.8rem;
            font-weight: 700;
            margin-top: 8px;
        }
        .mini-card .price {
            font-weight: 700;
            color: #2f80ed;
            font-size: 0.75rem;
            margin: 4px 0;
        }
        .mini-card p {
            font-size: 0.65rem;
            color: #5b6e8c;
        }
        .btn-view {
            background: #2f80ed;
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 0.65rem;
            font-weight: 600;
            padding: 5px 0;
            width: 100%;
            margin-top: 8px;
            text-align: center;
            cursor: pointer;
        }
        .chat-input-area {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: white;
            border-top: 1px solid #edf2f7;
            gap: 10px;
        }
        .input-field {
            flex: 1;
            background: #f1f5f9;
            border: none;
            border-radius: 40px;
            padding: 10px 16px;
            font-size: 0.8rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            cursor: text;
        }
        .mic-icon, .send-icon {
            background: #eef2ff;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2f80ed;
            font-size: 1rem;
            cursor: pointer;
        }
        .send-icon {
            background: #2f80ed;
            color: white;
        }
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* profile, bag, settings custom styles */
        .info-card {
            background: #f9fafc;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #edf2f7;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.85rem;
        }
        .info-label {
            font-weight: 600;
            color: #334155;
        }
        .info-value {
            color: #0f172a;
        }
        .bag-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #ecf3fa;
        }
        .bag-item-img {
            width: 55px;
            height: 55px;
            border-radius: 14px;
            background: #f1f5f9;
            overflow: hidden;
        }
        .bag-item-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .bag-item-details {
            flex: 1;
        }
        .bag-item-name {
            font-weight: 700;
            font-size: 0.85rem;
        }
        .bag-item-price {
            font-size: 0.75rem;
            color: #2f80ed;
            font-weight: 600;
        }
        .remove-item {
            color: #ef4444;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .total-price {
            font-weight: 800;
            margin-top: 16px;
            text-align: right;
            font-size: 1rem;
        }
        .setting-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #edf2f7;
        }
        .toggle-switch {
            width: 44px;
            height: 24px;
            background: #cbd5e1;
            border-radius: 30px;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }
        .toggle-switch.active {
            background: #2f80ed;
        }
        .toggle-knob {
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 3px;
            transition: 0.2s;
        }
        .toggle-switch.active .toggle-knob {
            left: 21px;
        }
        .back-to-chat {
            background: #eef2ff;
            border-radius: 30px;
            padding: 8px;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: #2f80ed;
            margin-top: 16px;
            cursor: pointer;
        }
        .update-profile{
            background: #d9f0ea;
            border-radius: 30px;
            padding: 8px;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: #2f80ed;
            margin-top: 16px;
            cursor: pointer;
        }
        .section-title {
            font-weight: 700;
            margin-bottom: 14px;
            font-size: 1rem;
            color: #0f172a;
        }
        @media (max-width: 550px) {
            .chat-sidebar { width: 56px; gap: 22px; }
            .bubble { max-width: 85%; }
            .chatbot-widget { bottom: 85px; right: 16px; left: auto; width: calc(100% - 32px); }
        }
    </style>
</head>
<body>
   

   <section class="chatbot" id="chatbot">

   
    <div class="chat-toggle-btn" id="chatToggleBtn">
        <i class="fas fa-comment-dots"></i>
    </div>

    <div class="chatbot-widget" id="chatbotWidget">
        <div class="chatbot-standalone">
            
            <div class="chat-window">
                <div class="chat-header">
                    <div class="header-ai">
                        <div class="robot-sm"><i class="fas fa-robot"></i></div>
                        <div class="ai-title">
                            <h4>ALPHA</h4>
                            <span>AI Stylist</span>
                        </div>
                    </div>
                    <div class="close-icon" id="widgetCloseBtn"><i class="fas fa-times"></i></div>
                </div>
                <div class="chat-body">
                    <div class="chat-sidebar" id="chatSidebar">
                        <i class="fas fa-comment-dots sidebar-icon active" data-view="chat" title="Chat"></i>
                        <i class="fas fa-user-circle sidebar-icon" data-view="profile" title="Profile"></i>
                        <i class="fas fa-shopping-bag sidebar-icon" data-view="bag" title="Bag"></i>
                        <i class="fas fa-cog sidebar-icon" data-view="settings" title="Settings"></i>
                    </div>
                    <div class="chat-messages" id="chatMessagesContainer"></div>
                </div>
                <div class="chat-input-area">
                    <div class="input-field" id="messageInput" contenteditable="true" role="textbox"></div>
                    <div class="mic-icon" id="micButton"><i class="fas fa-microphone"></i></div>
                    <div class="send-icon" id="sendButton"><i class="fas fa-arrow-up"></i></div>
                </div>
            </div>
        </div>
    </div>
    </section>

    <script>
        // ---------- PRODUCT SETS ----------
        const PRODUCT_SET_1 = [
            { name: "Sundress", price: "$89.99", desc: "Flowy & lightweight", img: "https://images.unsplash.com/photo-1515372039744-b8f02a3ae446?w=140&h=110&fit=crop" },
            { name: "Floral Midi", price: "$75.00", desc: "Vibrant pattern", img: "https://images.unsplash.com/photo-1595777457583-95e059d581b8?w=140&h=110&fit=crop" },
            { name: "Linen Dress", price: "$69.99", desc: "Breathable eco", img: "https://images.unsplash.com/photo-1525507119028-ed4c629a60a3?w=140&h=110&fit=crop" }
        ];
        const PRODUCT_SET_2 = [
            { name: "Chic Sundress", price: "$94.99", desc: "Elegant silhouette", img: "https://images.unsplash.com/photo-1585487000160-6ebcfceb0d03?w=140&h=110&fit=crop" },
            { name: "Boho Romper", price: "$82.00", desc: "Free-spirited", img: "https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?w=140&h=110&fit=crop" },
            { name: "Silk Slip", price: "$99.00", desc: "Luxury satin", img: "https://images.unsplash.com/photo-1564257631407-4deb1f99d992?w=140&h=110&fit=crop" }
        ];
        const PRODUCT_SET_3 = [
            { name: "Tropical Maxi", price: "$89.00", desc: "Vacation vibes", img: "https://images.unsplash.com/photo-1539008835657-9e8e9680c956?w=140&h=110&fit=crop" },
            { name: "Crochet Dress", price: "$79.99", desc: "Handmade details", img: "https://images.unsplash.com/photo-1509631179647-0177331693ae?w=140&h=110&fit=crop" },
            { name: "Cotton Shirtdress", price: "$68.50", desc: "Everyday staple", img: "https://images.unsplash.com/photo-1483985988355-763728e1935b?w=140&h=110&fit=crop" }
        ];

        // ----- Bag state (items the user adds via "VIEW ITEM" in chat carousels)
        let bagItems = []; // each item: { name, price, img }
        function addToBag(productName, productPrice, productImg) {
            bagItems.push({ name: productName, price: productPrice, img: productImg });
            renderCurrentView(); // refresh if bag view is open
        }
        function removeFromBag(index) {
            bagItems.splice(index, 1);
            renderCurrentView();
        }

        // ----- Chat messages state
        let messages = [];
        let isWaitingForAI = false;
        let currentView = 'chat'; // 'chat', 'profile', 'bag', 'settings'

        // DOM elements
        const messagesContainer = document.getElementById('chatMessagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendButton');
        const micBtn = document.getElementById('micButton');
        const widgetCloseBtn = document.getElementById('widgetCloseBtn');
        const toggleBtn = document.getElementById('chatToggleBtn');
        const widgetPanel = document.getElementById('chatbotWidget');
        const sidebarIcons = document.querySelectorAll('.sidebar-icon');

        // Helper: generate carousel HTML
        function generateCarouselHTML(products) {
            if (!products || products.length === 0) return document.createDocumentFragment();
            const container = document.createElement('div');
            container.className = 'product-strip';
            products.forEach(prod => {
                const card = document.createElement('div');
                card.className = 'mini-card';
                card.innerHTML = `
                    <div class="mini-card-img"><img src="${prod.img}" alt="${prod.name}" loading="lazy"></div>
                    <h5>${prod.name}</h5>
                    <div class="price">${prod.price}</div>
                    <p>${prod.desc}</p>
                    <div class="btn-view" data-name="${prod.name}" data-price="${prod.price}" data-img="${prod.img}">VIEW ITEM</div>
                `;
                container.appendChild(card);
            });
            setTimeout(() => {
                container.querySelectorAll('.btn-view').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const name = btn.getAttribute('data-name');
                        const price = btn.getAttribute('data-price');
                        const img = btn.getAttribute('data-img');
                        addToBag(name, price, img);
                        alert(`✨ "${name}" added to your bag!`);
                    });
                });
            }, 0);
            return container;
        }

        // Render chat messages
        function renderMessages() {
            if (!messagesContainer) return;
            messagesContainer.innerHTML = '';
            messages.forEach(msg => {
                const rowDiv = document.createElement('div');
                rowDiv.className = `message-row ${msg.type}`;
                if (msg.type === 'ai') {
                    const avatarDiv = document.createElement('div');
                    avatarDiv.className = 'avatar-ai';
                    avatarDiv.innerHTML = '<i class="fas fa-robot"></i>';
                    rowDiv.appendChild(avatarDiv);
                    const bubbleDiv = document.createElement('div');
                    bubbleDiv.className = 'bubble';
                    if (msg.text) {
                        const textSpan = document.createElement('div');
                        textSpan.innerText = msg.text;
                        bubbleDiv.appendChild(textSpan);
                    }
                    if (msg.carouselProducts && msg.carouselProducts.length) {
                        const carouselElem = generateCarouselHTML(msg.carouselProducts);
                        bubbleDiv.appendChild(carouselElem);
                    }
                    rowDiv.appendChild(bubbleDiv);
                } else {
                    const bubbleDiv = document.createElement('div');
                    bubbleDiv.className = 'bubble';
                    bubbleDiv.innerText = msg.text;
                    rowDiv.appendChild(bubbleDiv);
                }
                messagesContainer.appendChild(rowDiv);
            });
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Profile view
        function renderProfile() {
            messagesContainer.innerHTML = `
                <div class="info-card">
                    <div class="section-title"><i class="fas fa-user-circle"></i> Your Profile</div>
                    <div class="info-row"><span class="info-label">Name</span><span class="info-value">Emma Watson</span></div>
                    <div class="info-row"><span class="info-label">Email</span><span class="info-value">emma@styleandyou.com</span></div>
                    <div class="info-row"><span class="info-label">Preferred size</span><span class="info-value">S / M</span></div>
                    <div class="info-row"><span class="info-label">Style preferences</span><span class="info-value">Bohemian, Minimalist</span></div>
                    <div class="info-row"><span class="info-label">Member since</span><span class="info-value">2024</span></div>
                </div>

                <div class="update-profile">
                   <i class="fas fa-edit"></i> Update Profile
                </div>
                <div class="back-to-chat" id="backToChatBtn"><i class="fas fa-arrow-left"></i> Back to chat</div>
            `;
            document.getElementById('backToChatBtn')?.addEventListener('click', () => switchView('chat'));
        }

        // Bag view
        function renderBag() {
            if (bagItems.length === 0) {
                messagesContainer.innerHTML = `
                    <div style="text-align:center; padding: 30px 20px; color: #5b6e8c;">
                        <i class="fas fa-shopping-bag" style="font-size: 3rem; opacity: 0.5;"></i>
                        <p style="margin-top: 12px;">Your bag is empty.<br>Add items from the chat recommendations!</p>
                    </div>
                    <div class="back-to-chat" id="backToChatBtn"><i class="fas fa-arrow-left"></i> Back to chat</div>
                `;
                document.getElementById('backToChatBtn')?.addEventListener('click', () => switchView('chat'));
                return;
            }
            let total = 0;
            let itemsHtml = '';
            bagItems.forEach((item, idx) => {
                const priceNum = parseFloat(item.price.replace('$', ''));
                total += priceNum;
                itemsHtml += `
                    <div class="bag-item">
                        <div class="bag-item-img"><img src="${item.img}" alt="${item.name}"></div>
                        <div class="bag-item-details">
                            <div class="bag-item-name">${item.name}</div>
                            <div class="bag-item-price">${item.price}</div>
                        </div>
                        <div class="remove-item" data-index="${idx}"><i class="fas fa-trash-alt"></i></div>
                    </div>
                `;
            });
            messagesContainer.innerHTML = `
                <div class="section-title"><i class="fas fa-shopping-bag"></i> Your Bag (${bagItems.length})</div>
                <div class="info-card" style="padding: 12px;">
                    ${itemsHtml}
                    <div class="total-price">Total: $${total.toFixed(2)}</div>
                </div>
                <div class="back-to-chat" id="backToChatBtn"><i class="fas fa-arrow-left"></i> Back to chat</div>
            `;
            document.querySelectorAll('.remove-item').forEach(el => {
                const idx = parseInt(el.getAttribute('data-index'));
                el.addEventListener('click', () => removeFromBag(idx));
            });
            document.getElementById('backToChatBtn')?.addEventListener('click', () => switchView('chat'));
        }

        // Settings view with toggles
        let notificationsEnabled = true;
        let darkMode = false;
        function renderSettings() {
            messagesContainer.innerHTML = `
                <div class="section-title"><i class="fas fa-cog"></i> Settings</div>
                <div class="info-card">
                    <div class="setting-option">
                        <span>🔔 Enable notifications</span>
                        <div class="toggle-switch ${notificationsEnabled ? 'active' : ''}" id="notifToggle">
                            <div class="toggle-knob"></div>
                        </div>
                    </div>
                   
                    <div class="setting-option">
                        <span>🤖 AI response speed</span>
                        <select style="padding: 6px 10px; border-radius: 30px; border:1px solid #e2e8f0;">
                            <option>Standard</option>
                            <option>Fast</option>
                        </select>
                    </div>
                </div>
                <div class="back-to-chat" id="backToChatBtn"><i class="fas fa-arrow-left"></i> Back to chat</div>
            `;
            const notifToggle = document.getElementById('notifToggle');
            const darkToggle = document.getElementById('darkToggle');
            if (notifToggle) {
                notifToggle.addEventListener('click', () => {
                    notificationsEnabled = !notificationsEnabled;
                    renderSettings();
                });
            }
            if (darkToggle) {
                darkToggle.addEventListener('click', () => {
                    darkMode = !darkMode;
                    document.body.style.background = darkMode ? '#1e293b' : 'linear-gradient(145deg, #e9f0f5 0%, #f1f5f9 100%)';
                    renderSettings();
                });
            }
            document.getElementById('backToChatBtn')?.addEventListener('click', () => switchView('chat'));
        }

        // Main render based on currentView
        function renderCurrentView() {
            if (currentView === 'chat') {
                renderMessages();
            } else if (currentView === 'profile') {
                renderProfile();
            } else if (currentView === 'bag') {
                renderBag();
            } else if (currentView === 'settings') {
                renderSettings();
            }
            // update active class on sidebar icons
            sidebarIcons.forEach(icon => {
                const view = icon.getAttribute('data-view');
                if (view === currentView) {
                    icon.classList.add('active');
                } else {
                    icon.classList.remove('active');
                }
            });
        }

        function switchView(view) {
            currentView = view;
            renderCurrentView();
        }

        // Chat AI logic
        function addMessage(type, text, carouselProducts = null) {
            messages.push({ type, text, carouselProducts });
            if (currentView === 'chat') renderMessages();
        }

        async function botReplyAfterUser(userMessageText) {
            if (isWaitingForAI) return;
            isWaitingForAI = true;
            await new Promise(resolve => setTimeout(resolve, 550));
            let replyText = "";
            let chosenProducts = [];
            const lowerMsg = userMessageText.toLowerCase();
            if (lowerMsg.includes("dress") || lowerMsg.includes("summer") || lowerMsg.includes("style") || lowerMsg.includes("look")) {
                replyText = "Aria: I found more gorgeous summer picks! ✨ Check out these trending styles:";
                chosenProducts = PRODUCT_SET_2;
            } else if (lowerMsg.includes("accessorie") || lowerMsg.includes("bag") || lowerMsg.includes("shoe")) {
                replyText = "Aria: Accessories complete any outfit! Here are some chic additions:";
                chosenProducts = PRODUCT_SET_3;
            } else if (lowerMsg.includes("thanks") || lowerMsg.includes("merci")) {
                replyText = "Aria: You're very welcome! Let me know if you'd like more recommendations 💚";
                chosenProducts = [];
            } else {
                replyText = "Aria: I'd love to help you find the perfect outfit. How about these elegant dresses?";
                chosenProducts = PRODUCT_SET_1;
            }
            if (chosenProducts.length > 0) {
                addMessage('ai', replyText, chosenProducts);
            } else {
                addMessage('ai', replyText, null);
            }
            isWaitingForAI = false;
        }

        function sendUserMessage() {
            if (isWaitingForAI) {
                alert("Aria is thinking... just a moment");
                return;
            }
            let rawText = messageInput.innerText.trim();
            if (rawText === "" || rawText === "Type your question...") return;
            messageInput.innerText = "";
            addMessage('user', rawText);
            // if not in chat view, switch to chat
            if (currentView !== 'chat') switchView('chat');
            botReplyAfterUser(rawText);
        }

        function initConversation() {
            messages = [];
            addMessage('ai', 'Hello! How can I help you today?', null);
            addMessage('user', "I'm looking for a stylish summer dress under $100.");
            addMessage('ai', "Aria: Absolutely! Check out these top picks:", PRODUCT_SET_1);
        }

        // Widget toggling
        function openWidget() { widgetPanel.classList.add('open'); }
        function closeWidget() { widgetPanel.classList.remove('open'); }
        function toggleWidget() {
            if (widgetPanel.classList.contains('open')) closeWidget();
            else openWidget();
        }

        // Event bindings
        sendBtn.addEventListener('click', sendUserMessage);
        micBtn.addEventListener('click', () => alert("🎤 Voice input demo — coming soon. Type your message!"));
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendUserMessage();
            }
        });
        widgetCloseBtn.addEventListener('click', closeWidget);
        toggleBtn.addEventListener('click', toggleWidget);

        // Sidebar navigation
        sidebarIcons.forEach(icon => {
            icon.addEventListener('click', () => {
                const view = icon.getAttribute('data-view');
                if (view) switchView(view);
            });
        });

        // Placeholder handling
        function setPlaceholder() {
            if (!messageInput.innerText.trim()) {
                messageInput.innerText = 'Type your question...';
                messageInput.style.color = '#94a3b8';
            }
        }
        messageInput.addEventListener('focus', () => {
            if (messageInput.innerText === 'Type your question...') {
                messageInput.innerText = '';
                messageInput.style.color = '#1e293b';
            }
        });
        messageInput.addEventListener('blur', setPlaceholder);
        messageInput.innerText = 'Type your question...';
        messageInput.style.color = '#94a3b8';

        initConversation();
        closeWidget(); // start closed
    </script>
</body>
</html>
