<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha - Assistant Shopping Intelligent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
       

        .chatbot-widget {
            position: fixed;
            bottom: 50px;
            right: 24px;
            width: 520px;
            max-width: calc(100vw - 32px);
            z-index: 104450;
            opacity: 0;
            visibility: hidden;
            transform: translateY(24px) scale(0.94);
            transition: opacity 0.28s ease, transform 0.28s ease, visibility 0.28s ease;
        }

        .chatbot-widget.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .chat-window {
            border-radius: 28px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 28px 90px rgba(15, 23, 42, 0.14);
        }

        .chat-header {
            background: linear-gradient(135deg, #70c7f8 0%, #44a8f5 100%);
            padding: 20px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
        }

        .chat-header-content {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header-avatar {
            width: 46px;
            height: 46px;
            border-radius: 18px;
            display: grid;
            place-items: center;
            background: rgba(255, 255, 255, 0.72);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            font-size: 1.4rem;
        }

        .header-title h4 {
            margin: 0;
            font-size: 1rem;
            letter-spacing: 0.01em;
            color: #fff;
        }

        .header-title span {
            display: block;
            margin-top: 4px;
            font-size: 0.82rem;
            color: rgba(255, 255, 255, 0.88);
        }

        .chat-header-close {
            background: rgba(255, 255, 255, 0.18);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            color: #eef2ff;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .chat-header-close:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.04);
        }

        .chat-body {
            display: flex;
            min-height: 480px;
        }

        .chat-sidebar {
            width: 78px;
            background: rgba(255, 255, 255, 0.86);
            border-right: 1px solid rgba(15, 23, 42, 0.06);
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            box-shadow: inset -1px 0 0 rgba(15, 23, 42, 0.04);
        }

        .sidebar-icon {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: grid;
            place-items: center;
            font-size: 1.2rem;
            color: #6b7280;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .sidebar-icon.active {
            background: #2f80ed;
            color: #fff;
            box-shadow: 0 14px 30px rgba(47, 128, 237, 0.18);
        }

        .chat-messages {
            flex: 1;
            padding: 22px;
            overflow-y: auto;
            background: transparent;
            max-height: 480px;
        }

        .message-row {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            animation: fadeIn 0.24s ease;
        }

        .message-row.ai {
            justify-content: flex-start;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .avatar-ai {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: #eef6ff;
            color: #2563eb;
            flex-shrink: 0;
        }

        .bubble {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 24px;
            font-size: 0.95rem;
            line-height: 1.6;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.04);
        }

        .ai .bubble {
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(56, 189, 248, 0.16);
            border-top-left-radius: 14px;
            color: #1f2937;
        }

        .user .bubble {
            background: #2563eb;
            color: #fff;
            border-top-right-radius: 14px;
        }

        .product-strip {
            display: flex;
            gap: 14px;
            overflow-x: auto;
            padding: 10px 0;
        }

        .mini-card {
            min-width: 168px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 22px;
            border: 1px solid rgba(148, 163, 184, 0.16);
            padding: 14px;
            box-shadow: 0 16px 35px rgba(15, 23, 42, 0.06);
        }

        .mini-card-img {
            height: 118px;
            background: #f8fbff;
            border-radius: 18px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .mini-card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .mini-card h5 {
            font-size: 0.88rem;
            margin: 0 0 8px;
            color: #102a43;
        }

        .price {
            color: #2563eb;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .btn-view {
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 999px;
            padding: 10px 0;
            font-size: 0.82rem;
            margin-top: 10px;
            cursor: pointer;
            width: 100%;
        }

        .chat-input-area {
            padding: 20px 22px;
            background: rgba(255, 255, 255, 0.92);
            border-top: 1px solid rgba(15, 23, 42, 0.06);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-field {
            flex: 1;
            min-height: 48px;
            background: #f3f6fb;
            border: none;
            border-radius: 999px;
            padding: 14px 18px;
            outline: none;
            font-size: 0.96rem;
            color: #111827;
        }

        .input-field:empty:before {
            content: attr(data-placeholder);
            color: #9ca3af;
        }

        .send-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: #2563eb;
            color: white;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .send-icon:hover {
            transform: translateY(-1px);
            box-shadow: 0 16px 30px rgba(37, 99, 235, 0.24);
        }

        .chat-toggle-btn {
            position: fixed;
            bottom: 120px;
            right: 30px;
            width: 68px;
            height: 68px;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 1.9rem;
            color: white;
            cursor: pointer;
            box-shadow: 0 18px 40px rgba(37, 99, 235, 0.3);
            z-index: 104455;
            pointer-events: auto;
        }

        .bubble ul {
            margin: 8px 0;
            padding-left: 20px;
        }

        .bubble li {
            margin-bottom: 6px;
        }

        .bubble blockquote {
            border-left: 4px solid #3b82f6;
            margin: 12px 0;
            padding: 8px 16px;
            background: rgba(59, 130, 246, 0.05);
            border-radius: 4px;
            font-style: italic;
            color: #4b5563;
        }

        .bubble hr {
            border: 0;
            border-top: 1px solid rgba(15, 23, 42, 0.08);
            margin: 16px 0;
        }

        .bubble h4 {
            margin: 16px 0 8px;
            color: #111827;
            font-size: 1.1rem;
        }

        .product-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin: 12px 0;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(15, 23, 42, 0.06);
            background: #fff;
        }

        .product-table th {
            background: #f8fafc;
            padding: 12px;
            text-align: left;
            font-size: 0.85rem;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        .product-table td {
            padding: 12px;
            border-top: 1px solid rgba(15, 23, 42, 0.06);
            font-size: 0.9rem;
            color: #334155;
        }

        .product-table tr:hover {
            background: #f1f5f9;
        }

        .price-tag {
            color: #2563eb;
            font-weight: 700;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="chat-toggle-btn" id="chatToggleBtn">
        <i class="fas fa-comment-dots"></i>
    </div>

    <div class="chatbot-widget" id="chatbotWidget">
        <div class="chat-window">
            <div class="chat-header">
                <div class="chat-header-content">
                    <div class="header-avatar">🤖</div>
                    <div class="header-title">
                        <h4>Alpha</h4>
                        <span>Assistant Shopping • 100 Produits</span>
                    </div>
                </div>
                <div class="chat-header-close" id="widgetCloseBtn">
                    <i class="fas fa-times"></i>
                </div>
            </div>

            <div class="chat-body">
                <div class="chat-sidebar">
                    <i class="fas fa-comment-dots sidebar-icon active" data-view="chat"></i>
                    <i class="fas fa-user-circle sidebar-icon" data-view="profile"></i>
                    <i class="fas fa-shopping-bag sidebar-icon" data-view="bag"></i>
                    <i class="fas fa-cog sidebar-icon" data-view="settings"></i>
                </div>
                <div class="chat-messages" id="chatMessagesContainer"></div>
            </div>

            <div class="chat-input-area">
                <div class="input-field" id="messageInput" contenteditable="true" data-placeholder="Posez votre question..."></div>
                <div class="send-icon" id="sendButton"><i class="fas fa-paper-plane"></i></div>
            </div>
        </div>
    </div>


</body>
</html>
