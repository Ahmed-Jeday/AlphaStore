<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Virtual Try-On · IDM-VTON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <p class="eyebrow">Powered by IDM-VTON</p>
    <h1>Virtual Try-On</h1>
    <p>Habille ton modèle avec un vêtement en quelques secondes</p>
  </header>

  <div class="container">

    <!-- Upload row -->
    <div class="grid">
      <div class="card">
        <label>Photo du modèle</label>
        <div class="drop-zone" id="zone-bg">
          <span class="drop-icon">🧍</span>
          <span class="drop-text">Cliquer ou glisser une image</span>
          <input type="file" id="bg-file" accept="image/*" />
        </div>
      </div>

      <div class="card">
        <label>Vêtement</label>
        <div class="drop-zone" id="zone-garm">
          <span class="drop-icon">👕</span>
          <span class="drop-text">Cliquer ou glisser une image</span>
          <input type="file" id="garm-file" accept="image/*" />
        </div>
      </div>
    </div>

    <!-- Settings -->
    <div class="card">
      <label>Paramètres</label>
      <div class="field">
        <label>Description du vêtement</label>
        <input type="text" id="garment-desc" value="Un t-shirt noir"
               placeholder="Ex : Une robe rouge florale"/>
      </div>
      <div class="grid" style="gap:.75rem">
        <div class="field">
          <label>Étapes de débruitage</label>
          <input type="number" id="denoise-steps" value="30" min="10" max="50"/>
        </div>
        <div class="field">
          <label>Seed aléatoire</label>
          <input type="number" id="seed" value="42"/>
        </div>
      </div>
      <div class="options-row">
        <label class="toggle-label">
          <input type="checkbox" id="is-checked" checked/> Auto-masque
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="is-checked-crop"/> Recadrage auto
        </label>
      </div>
    </div>

    <!-- Action -->
    <button class="btn-run" id="btn-run">✦ Générer le try-on</button>

    <!-- Loading -->
    <div class="spinner-wrap" id="spinner">
      <div class="spinner"></div>
      <span class="spinner-text">Génération en cours — cela peut prendre ~30s…</span>
    </div>

    <!-- Status message -->
    <div id="status-msg"></div>

    <!-- Result -->
    <div id="result-section">
      <div class="card">
        <label>Résultat</label>
        <img id="result-img" src="" alt="Résultat try-on"/>
        <a id="download-link" class="btn-download" download="tryon_output.jpg">
          ⬇ Télécharger
        </a>
      </div>
    </div>

  </div><!-- /.container -->

  <script src="main.js"></script>
</body>
</html>
